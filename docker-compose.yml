
services:

  backend:
    build: ./backend
    container_name: ai-growth-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    depends_on:
      - postgres
      - redis

    env_file:
      - .env

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16

    container_name: postgres-ai-growth

    environment:
      POSTGRES_PASSWORD: manya123
      POSTGRES_DB: ai_social_growth_os

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis

    container_name: redis-ai-growth

    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant

    container_name: qdrant-ai-memory

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

  celery_worker:
    build: ./backend

    container_name: celery-worker

    depends_on:
      - redis
      - backend

    env_file:
      - .env

    command: celery -A app.core.celery_app worker --loglevel=info

volumes:
  postgres_data:
  qdrant_data:

    